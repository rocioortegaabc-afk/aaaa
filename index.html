<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor de Órdenes - Carga Automática</title>
    <style>
        :root { --p: #2c3e50; --s: #3498db; --a: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #ecf0f1; display: flex; flex-direction: column; align-items: center; }
        
        .nav { width: 100%; background: var(--p); padding: 10px; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .tool { background: #bdc3c7; color: var(--p); }
        .tool.active { background: var(--s); color: white; }
        .btn-print { background: var(--a); color: white; }
        
        #canvas-frame { margin: 20px; background: white; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        canvas { cursor: crosshair; max-width: 100%; height: auto; }

        @media print {
            .nav, .info { display: none !important; }
            body { background: white; }
            #canvas-frame { margin: 0; box-shadow: none; }
        }
        .info { font-size: 0.8em; color: #7f8c8d; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="nav">
        <button class="tool active" id="btn-text" onclick="setMode('text')">Texto (T)</button>
        <button class="tool" id="btn-cross" onclick="setMode('cross')">Cruz (X)</button>
        <button class="tool" id="btn-erase" style="background:#95a5a6; color:white" onclick="setMode('erase')">Goma</button>
        <button class="btn-print" onclick="window.print()">Imprimir / Guardar PDF</button>
    </div>

    <div class="info">Archivo esperado: <b>ordenes_examenes.jpg</b> en la misma carpeta.</div>

    <div id="canvas-frame">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let mode = 'text';
        let isDrawing = false;
        const img = new Image();

        // --- CONFIGURACIÓN DEL ARCHIVO ---
        // Asegúrate de que la extensión (.jpg, .png, etc.) coincida con tu archivo
        img.src = 'ordenes_examenes.jpg'; 

        img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
        };

        img.onerror = () => {
            alert("Error: No encontré el archivo 'ordenes_examenes.jpg'. \n\n1. Asegúrate de que el nombre sea exacto.\n2. Que esté en la misma carpeta que este HTML.\n3. Si usas Chrome/Edge, intenta abrir este archivo con Firefox.");
        };

        function setMode(m) {
            mode = m;
            document.querySelectorAll('.tool').forEach(b => b.classList.remove('active'));
            if(m !== 'erase') document.getElementById(`btn-${m}`).classList.add('active');
        }

        canvas.addEventListener('mousedown', (e) => {
            const pos = getPos(e);
            if (mode === 'text') {
                const val = prompt("Texto:");
                if (val) {
                    ctx.font = "bold 22px Arial";
                    ctx.fillStyle = "black";
                    ctx.fillText(val, pos.x, pos.y);
                }
            } else if (mode === 'cross') {
                drawX(pos.x, pos.y);
            } else if (mode === 'erase') {
                isDrawing = true;
                clean(pos.x, pos.y);
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (mode === 'erase' && isDrawing) {
                const pos = getPos(e);
                clean(pos.x, pos.y);
            }
        });

        window.addEventListener('mouseup', () => isDrawing = false);

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const sx = canvas.width / rect.width;
            const sy = canvas.height / rect.height;
            return { x: (e.clientX - rect.left) * sx, y: (e.clientY - rect.top) * sy };
        }

        function drawX(x, y) {
            ctx.strokeStyle = "black";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(x-10, y-10); ctx.lineTo(x+10, y+10);
            ctx.moveTo(x+10, y-10); ctx.lineTo(x-10, y+10);
            ctx.stroke();
        }

        function clean(x, y) {
            const s = 40; // Tamaño goma
            ctx.drawImage(img, x-s/2, y-s/2, s, s, x-s/2, y-s/2, s, s);
        }
    </script>
</body>
</html>
